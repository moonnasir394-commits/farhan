<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Groq Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1c1c1c;
    --surface:   #262626;
    --border:    #333;
    --accent:    #ff9f43;
    --accent2:   #ff6b00;
    --text:      #f5f5f5;
    --muted:     #999;
    --user-bg:   #2a2a2a;
    --bot-bg:    #222;
    --radius:    14px;
    --font-ui:   'Syne', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 22px 28px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  .logo-ring {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: conic-gradient(var(--accent), var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    animation: spin 8s linear infinite;
    flex-shrink: 0;
  }
  .logo-ring::after {
    content: '';
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .header-text h1 {
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .header-text span {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: var(--font-code);
    letter-spacing: 0.05em;
  }

  .model-badge {
    margin-left: auto;
    font-family: var(--font-code);
    font-size: 0.68rem;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--accent);
    background: rgba(124,106,255,0.08);
    letter-spacing: 0.04em;
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome state */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    opacity: 0.5;
    user-select: none;
    text-align: center;
  }
  .welcome-icon { font-size: 2.5rem; }
  .welcome h2 { font-size: 1.1rem; font-weight: 700; }
  .welcome p { font-size: 0.8rem; color: var(--muted); font-family: var(--font-code); }

  /* Message row */
  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.user .avatar  { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.bot  .avatar  { background: var(--surface); border: 1px solid var(--border); }

  .bubble {
    max-width: 72%;
    padding: 13px 17px;
    border-radius: var(--radius);
    font-size: 0.9rem;
    line-height: 1.65;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,106,255,0.25);
    border-top-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  /* Typing indicator */
  .typing .bubble {
    padding: 14px 20px;
  }
  .dots { display: flex; gap: 5px; }
  .dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s ease infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40%         { transform: translateY(-6px); background: var(--accent); }
  }

  /* ── Input Bar ── */
  .input-area {
    padding: 16px 28px 24px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: calc(var(--radius) + 4px);
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 0.9rem;
    resize: none;
    line-height: 1.6;
    max-height: 140px;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--muted); }
  textarea::-webkit-scrollbar { width: 3px; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }
  .send-btn:hover:not(:disabled) { transform: scale(1.07); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    margin-top: 8px;
    font-family: var(--font-code);
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
  }

  /* ── Clear button ── */
  .clear-btn {
    position: absolute;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-code);
    font-size: 0.68rem;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.03em;
  }
  .clear-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  /* error bubble */
  .error-bubble {
    color: #ff6a6a;
    font-size: 0.8rem;
    font-family: var(--font-code);
    padding: 8px 14px;
    border: 1px solid rgba(255,106,106,0.3);
    border-radius: 8px;
    background: rgba(255,106,106,0.06);
    margin: 0 0 0 42px;
    animation: fadeUp 0.2s ease forwards;
    opacity: 0;
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo-ring"></div>
    <div class="header-text">
      <h1>Farhan's Shop</h1>
      <span>AI Assistant</span>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⚡</div>
      <h2>Groq-powered AI</h2>
      <p>Ultra-fast inference · Start typing below</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Type a message…" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>

</div>

<script>
  // ── State ───────────────────────────────────────────────────
  const API_URL  = "http://127.0.0.1:5000/chat";  // Change if deployed
  let history    = [];   // [{role, content}, ...]
  let isLoading  = false;

  // ── DOM helpers ─────────────────────────────────────────────
  const $msgs   = document.getElementById("messages");
  const $input  = document.getElementById("input");
  const $btn    = document.getElementById("sendBtn");
  const $welcome= document.getElementById("welcome");

  function scrollBottom() {
    $msgs.scrollTop = $msgs.scrollHeight;
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 140) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function clearChat() {
    history = [];
    $msgs.innerHTML = "";
    $msgs.appendChild($welcome);
    $welcome.style.display = "flex";
  }

  // ── Render a message bubble ──────────────────────────────────
  function addMessage(role, text) {
    if ($welcome) $welcome.style.display = "none";

    const row = document.createElement("div");
    row.className = "msg " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "U" : "⚡";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    $msgs.appendChild(row);
    scrollBottom();
    return bubble;
  }

  // ── Typing indicator ─────────────────────────────────────────
  function showTyping() {
    if ($welcome) $welcome.style.display = "none";
    const row = document.createElement("div");
    row.className = "msg bot typing";
    row.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "⚡";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="dots"><span></span><span></span><span></span></div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    $msgs.appendChild(row);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  // ── Error display ─────────────────────────────────────────────
  function showError(msg) {
    const el = document.createElement("div");
    el.className = "error-bubble";
    el.textContent = "⚠ " + msg;
    $msgs.appendChild(el);
    scrollBottom();
  }

  // ── Main send function ───────────────────────────────────────
  async function sendMessage() {
    const text = $input.value.trim();
    if (!text || isLoading) return;

    // Update UI
    isLoading = true;
    $btn.disabled = true;
    $input.value = "";
    $input.style.height = "auto";

    // Add user message
    history.push({ role: "user", content: text });
    addMessage("user", text);
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      hideTyping();

      if (data.error) {
        showError(data.error);
        history.pop(); // remove failed user message from history
      } else {
        history.push({ role: "assistant", content: data.reply });
        addMessage("bot", data.reply);
      }
    } catch (err) {
      hideTyping();
      showError("Could not reach the server. Is Flask running?");
      history.pop();
    }

    isLoading = false;
    $btn.disabled = false;
    $input.focus();
  }
</script>
</body>
</html>
